name: Carlote QA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  carlote:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Criar .env
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

      - name: Instalar dependencias
        run: npm install carlote-ia dotenv groq-sdk

      - name: Rodar Carlote
        run: node node_modules/carlote-ia/src/carlote.js src/App.js

      - name: Upload relatorio
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-qa-carlote
          path: "*.html"